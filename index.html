<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活日记</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>生活日记</h1>
            <p>记录身边的美好瞬间</p>
            <div class="header-meta">
                <span id="todayDisplay"></span>
                <span class="meta-sep">·</span>
                <span id="diaryCount"></span>
            </div>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换主题"></button>
        </div>
    </header>

    <main class="container">
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="搜索日记标题..." />
            <select id="sortSelect" class="filter-select" aria-label="按日期排序">
                <option value="desc">最新优先</option>
                <option value="asc">最早优先</option>
            </select>
            <div class="tag-list" id="tagList"></div>
        </div>
        <div class="diary-grid" id="diaryGrid"></div>
        <div class="load-more-wrap">
            <button id="loadMoreBtn" class="load-more-btn" type="button">加载更多</button>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>用心记录生活，用爱书写故事</p>
        </div>
    </footer>
    <button id="backToTopBtn" class="back-to-top" type="button" aria-label="回到顶部">↑</button>

    <script src="js/main.js"></script>
    <script>
        let allDiaries = [];
        let filteredDiaries = [];
        let activeTag = null;
        let sortOrder = 'desc';
        let visibleCount = 0;
        const PAGE_SIZE = 6;

        function renderDiaryCard(diary) {
            const card = document.createElement('div');
            card.className = 'diary-card';
            card.onclick = () => window.location.href = `diary.html?id=${diary.id}`;

            const coverHtml = diary.cover
                ? `<img src="${diary.cover}" alt="${diary.title}" class="diary-card-cover" loading="lazy" onerror="this.outerHTML='<div class=placeholder-cover>暂无封面图片</div>'">`
                : `<div class="placeholder-cover">暂无封面图片</div>`;

            const tagsHtml = (diary.tags || []).map(t =>
                `<span class="tag">${t}</span>`
            ).join('');

            card.innerHTML = `
                ${coverHtml}
                <div class="diary-card-content">
                    <div class="diary-card-date">
                        ${formatDate(diary.date)}
                        <span class="relative-time">${getRelativeTime(diary.date)}</span>
                    </div>
                    <h2 class="diary-card-title">${diary.title}</h2>
                    <p class="diary-card-summary">${diary.summary}</p>
                    <div class="card-tags">${tagsHtml}</div>
                </div>
            `;
            return card;
        }

        function updateLoadMore(total) {
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            if (total <= visibleCount) {
                loadMoreBtn.style.display = 'none';
                return;
            }
            loadMoreBtn.style.display = 'inline-flex';
            loadMoreBtn.textContent = `加载更多 (${Math.min(visibleCount, total)}/${total})`;
        }

        function renderGrid(diaries) {
            const grid = document.getElementById('diaryGrid');
            grid.innerHTML = '';
            if (diaries.length === 0) {
                grid.innerHTML = '<p class="no-result">没有找到相关日记</p>';
                document.getElementById('loadMoreBtn').style.display = 'none';
                return;
            }
            const visibleDiaries = diaries.slice(0, visibleCount);
            visibleDiaries.forEach(d => grid.appendChild(renderDiaryCard(d)));
            updateLoadMore(diaries.length);
        }

        function sortDiariesByDate(diaries) {
            return getSortedDiaries(diaries, sortOrder);
        }

        function applyFilter(resetVisibleCount = false) {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
            const result = allDiaries.filter(d => {
                const matchTag = !activeTag || (d.tags || []).includes(activeTag);
                const matchSearch = !keyword || d.title.toLowerCase().includes(keyword);
                return matchTag && matchSearch;
            });
            filteredDiaries = sortDiariesByDate(result);
            if (resetVisibleCount) visibleCount = PAGE_SIZE;
            renderGrid(filteredDiaries);
        }

        function renderTagList(diaries) {
            const tags = [...new Set(diaries.flatMap(d => d.tags || []))];
            const container = document.getElementById('tagList');
            container.innerHTML = '';
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = 'tag-btn';
                btn.textContent = tag;
                btn.onclick = () => {
                    activeTag = activeTag === tag ? null : tag;
                    document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
                    if (activeTag) btn.classList.add('active');
                    applyFilter(true);
                };
                container.appendChild(btn);
            });
        }

        async function init() {
            initTheme();
            bindThemeToggle();
            initBackToTop();
            await loadDiariesData();
            allDiaries = getAllDiaries();
            document.getElementById('todayDisplay').textContent = getTodayStr();
            document.getElementById('diaryCount').textContent = `共 ${allDiaries.length} 篇日记`;
            renderTagList(allDiaries);
            visibleCount = PAGE_SIZE;
            filteredDiaries = sortDiariesByDate(allDiaries);
            renderGrid(filteredDiaries);
            document.getElementById('searchInput').addEventListener('input', () => applyFilter(true));
            document.getElementById('sortSelect').addEventListener('change', (event) => {
                sortOrder = event.target.value;
                applyFilter(true);
            });
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                visibleCount += PAGE_SIZE;
                renderGrid(filteredDiaries);
            });
        }

        init();
    </script>
</body>
</html>
